name: ETL Workflow Demo

on:
  workflow_dispatch:

jobs:

  run-etl:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v5

      - name: Install Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      - name: Execute ETL
        run: |
          python main.py
